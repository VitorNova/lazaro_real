# Lazaro V2 - Docker Compose
# Stack: API + IA + Redis (Frontend via PM2 em /var/www/lazaro)

services:
  # ==========================================================================
  # LAZARO API - Backend Fastify/TypeScript
  # ==========================================================================
  lazaro-api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: lazaro-api-v2
    restart: unless-stopped
    ports:
      - "127.0.0.1:3112:3102"  # SECURITY: Apenas localhost (nginx proxy)
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3102
      - REDIS_URL=redis://lazaro-redis:6379
    depends_on:
      - lazaro-redis
    networks:
      - lazaro-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3102/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================================================
  # LAZARO IA - Agente Python (DESABILITADO - roda via PM2)
  # ==========================================================================
  # NOTA: lazaro-ia roda via PM2 em /var/www/lazaro-real/apps/ia
  # Não usar container Docker para evitar conflito de porta 3115
  # lazaro-ia:
  #   image: lazaro-ia:v1.0
  #   container_name: lazaro-ia-v2
  #   ...

  # ==========================================================================
  # LAZARO REDIS - Cache compartilhado
  # ==========================================================================
  lazaro-redis:
    image: redis:7-alpine
    container_name: lazaro-redis-v2
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"  # SECURITY: Apenas localhost
    volumes:
      - lazaro-redis-data:/data
    networks:
      - lazaro-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  lazaro-network:
    driver: bridge

volumes:
  lazaro-redis-data:
