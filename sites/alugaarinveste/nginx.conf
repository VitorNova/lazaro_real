server {
    server_name alugaarinveste.fazinzz.com;
    root /var/www/alugaarinveste;
    index index.html;

    # Frontend estático
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Let's Encrypt challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/alugaarinveste;
        default_type text/plain;
        try_files $uri =404;
    }

    # SSL
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/alugaarinveste.fazinzz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alugaarinveste.fazinzz.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name alugaarinveste.fazinzz.com;
    return 301 https://$host$request_uri;
}
